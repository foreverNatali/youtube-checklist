<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Мой канал · Чек-лист</title>
  <meta name="theme-color" content="#f5f0e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Канал" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:#f5f0e8;color:#2a2420;
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI','Helvetica Neue',Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior-y:contain;
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
    }
    #root{min-height:100%;max-width:680px;margin:0 auto;background:#f5f0e8}
    @media (min-width: 720px){
      body{ background:#e8dfd0; }
      #root{ box-shadow:0 0 60px rgba(0,0,0,0.08); }
    }
    @keyframes sheetFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes sheetSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    ::-webkit-scrollbar{display:none}
    button{font-family:inherit}
    input,button{-webkit-appearance:none;appearance:none}
  </style>
</head>
<body>
  <div id="root" style="padding:40px;text-align:center;color:#9a8878;font-style:italic">загружаю…</div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app-data.jsx"></script>
  <script type="text/babel" src="app-sheets.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const LS_KEY = 'checklist_v3';
    const LEGACY_KEY = 'checklist_v2';

    function loadLocal() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) return appMigrate(JSON.parse(raw));
        const legacy = localStorage.getItem(LEGACY_KEY);
        if (legacy) {
          const migrated = appMigrate(JSON.parse(legacy));
          localStorage.setItem(LS_KEY, JSON.stringify(migrated));
          return migrated;
        }
      } catch (e) {}
      return appInitialState();
    }
    function saveLocal(state) { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} }

    let db = null, auth = null, fbUnsub = null, saveTimer = null, hasPulledOnce = false;

    function loadScript(src) {
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    async function initFirebase(handlers) {
      try {
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js');
        firebase.initializeApp({
          apiKey: 'AIzaSyAwhbOo4kQ_fsOnHTKYvc7ogg1YO2CGqwA',
          authDomain: 'checklist-8598f.firebaseapp.com',
          projectId: 'checklist-8598f',
          storageBucket: 'checklist-8598f.firebasestorage.app',
          messagingSenderId: '336930799163',
          appId: '1:336930799163:web:775f3b715e8ea1317ba61e',
        });
        auth = firebase.auth();
        db = firebase.firestore();
        handlers.onReady();

        // Handle return from Google redirect (must be called on every page load)
        auth.getRedirectResult().catch(err => {
          if (err && err.code !== 'auth/no-auth-event') {
            console.error('getRedirectResult error:', err.code);
          }
        });

        auth.onAuthStateChanged(u => {
          if (fbUnsub) { fbUnsub(); fbUnsub = null; }
          hasPulledOnce = false;
          handlers.onUser(u);
          if (u) {
            handlers.onSync('подключаю…');
            fbUnsub = db.collection('users').doc(u.uid).onSnapshot(snap => {
              if (!hasPulledOnce) {
                if (snap.exists && snap.data()) {
                  const remote = snap.data();
                  if (remote.videos && remote.videos.length) handlers.onRemote(appMigrate(remote));
                }
                hasPulledOnce = true;
              }
              handlers.onSync('✓ сохранено');
            }, () => handlers.onSync('⚠ ошибка'));
          } else {
            handlers.onSync('локально');
          }
        });
      } catch (e) {
        handlers.onError(e?.message || 'нет связи');
        handlers.onSync('⚠ нет связи');
      }
    }

    function saveToFirebase(state, onSync) {
      if (!db || !auth?.currentUser || !hasPulledOnce) return;
      clearTimeout(saveTimer);
      onSync('сохраняю…');
      saveTimer = setTimeout(() => {
        db.collection('users').doc(auth.currentUser.uid).set(state, { merge: true })
          .then(() => onSync('✓ сохранено'))
          .catch(() => onSync('⚠ ошибка'));
      }, 700);
    }

    function Root() {
      const [bootState, setBootState] = React.useState(() => loadLocal());
      const [syncLabel, setSyncLabel] = React.useState('локально');
      const [user, setUser] = React.useState(null);
      const [fbReady, setFbReady] = React.useState(false);
      const [fbError, setFbError] = React.useState(null);
      const [seedKey, setSeedKey] = React.useState(0);

      React.useEffect(() => {
        initFirebase({
          onReady: () => setFbReady(true),
          onUser: (u) => setUser(u),
          onSync: (l) => setSyncLabel(l),
          onError: (msg) => setFbError(msg),
          onRemote: (remote) => { setBootState(remote); setSeedKey(k => k + 1); },
        });
      }, []);

      const persist = React.useCallback((state) => {
        saveLocal(state);
        saveToFirebase(state, setSyncLabel);
      }, []);

      const login = () => {
        if (!auth) { setSyncLabel('⚠ Firebase не загрузился'); return; }
        auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider())
          .catch((err) => { console.error(err); setSyncLabel('⚠ ' + (err?.message || 'не удалось войти')); });
      };
      const logout = () => { if (auth) auth.signOut(); };

      return (
        <App key={seedKey} initialState={bootState} onPersist={persist}
          syncLabel={syncLabel} user={user} onLogin={login} onLogout={logout}
          fbReady={fbReady} fbError={fbError} />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
