<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Мой канал · Чек-лист</title>
  <meta name="theme-color" content="#f5f0e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Канал" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:#f5f0e8;color:#2a2420;
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI','Helvetica Neue',Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior-y:contain;
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
    }
    #root{min-height:100%}
    @keyframes sheetFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes sheetSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    /* hide scrollbars in carousel */
    ::-webkit-scrollbar{display:none}
    button{font-family:inherit}
    input,button{-webkit-appearance:none;appearance:none}
  </style>
</head>
<body>
  <div id="root" style="padding:40px;text-align:center;color:#9a8878;font-style:italic">загружаю…</div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App modules -->
  <script type="text/babel" src="app-data.jsx"></script>
  <script type="text/babel" src="app-sheets.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <!-- Sync layer + bootstrap -->
  <script type="text/babel">
    // ─────────────────────────────────────────────────────────────
    // Persistence: localStorage (always) + Firebase (when signed in)
    // ─────────────────────────────────────────────────────────────
    const LS_KEY = 'checklist_v3';   // new key; we read v2 once to migrate
    const LEGACY_KEY = 'checklist_v2';

    function loadLocal() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) return appMigrate(JSON.parse(raw));
        // One-time migration from the old single-array format
        const legacy = localStorage.getItem(LEGACY_KEY);
        if (legacy) {
          const parsed = JSON.parse(legacy);
          const migrated = appMigrate(parsed);
          localStorage.setItem(LS_KEY, JSON.stringify(migrated));
          return migrated;
        }
      } catch (e) {}
      return appInitialState();
    }
    function saveLocal(state) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
    }

    // ─── Firebase (lazy-loaded — same project as before) ───
    let db = null, auth = null, fbUnsub = null, saveTimer = null;
    let hasPulledOnce = false; // don't push local state until we've pulled cloud
    let setReactBridge = null; // set from inside App via React state hooks below

    function loadScript(src) {
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    async function initFirebase(handlers) {
      try {
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js');
        firebase.initializeApp({
          apiKey: 'AIzaSyAwhbOo4kQ_fsOnHTKYvc7ogg1YO2CGqwA',
          authDomain: 'checklist-8598f.firebaseapp.com',
          projectId: 'checklist-8598f',
          storageBucket: 'checklist-8598f.firebasestorage.app',
          messagingSenderId: '336930799163',
          appId: '1:336930799163:web:775f3b715e8ea1317ba61e',
        });
        auth = firebase.auth();
        db = firebase.firestore();
        // Persist auth across PWA / Safari sessions on iOS
        try { await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); } catch (e) {}
        // Complete redirect sign-in if we just came back from Google
        try { await auth.getRedirectResult(); } catch (e) {}
        handlers.onReady();
        auth.onAuthStateChanged(u => {
          if (fbUnsub) { fbUnsub(); fbUnsub = null; }
          hasPulledOnce = false; // gate pushes until we've pulled fresh cloud
          handlers.onUser(u);
          if (u) {
            handlers.onSync('подключаю…');
            fbUnsub = db.collection('users').doc(u.uid).onSnapshot(snap => {
              if (snap.exists && snap.data()) {
                // Pull remote state if it's not empty
                const remote = snap.data();
                if (remote.videos && remote.videos.length) {
                  handlers.onRemote(appMigrate(remote));
                }
              }
              hasPulledOnce = true; // safe to push from now on
              handlers.onSync('✓ сохранено');
            }, () => handlers.onSync('⚠ ошибка'));
          } else {
            handlers.onSync('локально');
          }
        });
      } catch (e) {
        handlers.onSync('локально (нет связи)');
      }
    }

    function saveToFirebase(state, onSync) {
      if (!db || !auth?.currentUser) return;
      if (!hasPulledOnce) return; // wait until we've pulled cloud first
      clearTimeout(saveTimer);
      onSync('сохраняю…');
      saveTimer = setTimeout(() => {
        db.collection('users').doc(auth.currentUser.uid).set(state, { merge: true })
          .then(() => onSync('✓ сохранено'))
          .catch(() => onSync('⚠ ошибка'));
      }, 700);
    }

    // ─────────────────────────────────────────────────────────────
    // Root: bridges sync layer ↔ React state
    // ─────────────────────────────────────────────────────────────
    function Root() {
      const [bootState, setBootState] = React.useState(() => loadLocal());
      const [syncLabel, setSyncLabel] = React.useState('локально');
      const [user, setUser] = React.useState(null);
      const [fbReady, setFbReady] = React.useState(false);
      // Used to force-remount App when a remote snapshot arrives (so it
      // re-seeds activeId etc from the new state).
      const [seedKey, setSeedKey] = React.useState(0);

      React.useEffect(() => {
        initFirebase({
          onReady: () => setFbReady(true),
          onUser: (u) => setUser(u),
          onSync: (l) => setSyncLabel(l),
          onRemote: (remote) => { setBootState(remote); setSeedKey(k => k + 1); },
        });
      }, []);

      const persist = React.useCallback((state) => {
        saveLocal(state);
        saveToFirebase(state, setSyncLabel);
      }, []);

      const login = () => {
        if (!auth) return;
        const provider = new firebase.auth.GoogleAuthProvider();
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
          || window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone;
        if (isMobile) {
          // iOS Safari / PWA: popups are blocked. Redirect goes through Google
          // and returns via getRedirectResult() on next load.
          auth.signInWithRedirect(provider).catch(() => setSyncLabel('⚠ не удалось войти'));
        } else {
          auth.signInWithPopup(provider).catch((err) => {
            // Some browsers block popup — fall back to redirect.
            if (err && (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user' || err.code === 'auth/operation-not-supported-in-this-environment')) {
              auth.signInWithRedirect(provider).catch(() => setSyncLabel('⚠ не удалось войти'));
            } else {
              setSyncLabel('⚠ не удалось войти');
            }
          });
        }
      };
      const logout = () => { if (auth) auth.signOut(); };

      return (
        <App
          key={seedKey}
          initialState={bootState}
          onPersist={persist}
          syncLabel={syncLabel}
          user={user}
          onLogin={login}
          onLogout={logout}
          fbReady={fbReady}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
