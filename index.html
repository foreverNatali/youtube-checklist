<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой канал · Чек-лист</title>
  <meta name="theme-color" content="#f5f0e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Чек-лист" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0e8; color: #2a2420; font-family: Georgia, serif; }
    ::-webkit-scrollbar { display: none; }
    input:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey:            "AIzaSyAwhbOo4kQ_fsOnHTKYvc7ogg1YO2CGqwA",
      authDomain:        "checklist-8598f.firebaseapp.com",
      projectId:         "checklist-8598f",
      storageBucket:     "checklist-8598f.firebasestorage.app",
      messagingSenderId: "336930799163",
      appId:             "1:336930799163:web:775f3b715e8ea1317ba61e",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    const STEPS = [
      { id: 1,  phase: "📝 Подготовка",   task: "Придумать сценарий",                                       who: "Gemini + Claude" },
      { id: 2,  phase: "🎬 Производство",  task: "Снять видео",                                              who: "Ты" },
      { id: 3,  phase: "🎬 Производство",  task: "Смонтировать видео",                                       who: "Ты" },
      { id: 4,  phase: "📤 Публикация",    task: "Загрузить ролик на YouTube",                               who: "Ты" },
      { id: 5,  phase: "📤 Публикация",    task: "Выгрузить субтитры через YouTube",                         who: "Ты" },
      { id: 6,  phase: "📤 Публикация",    task: "Перевести субтитры, название и описание на английский",    who: "Gemini" },
      { id: 7,  phase: "📤 Публикация",    task: "Описание на русском и английском + заголовки",             who: "Gemini" },
      { id: 8,  phase: "🎨 Оформление",   task: "Сделать обложку для YouTube",                              who: "ChatGPT" },
      { id: 9,  phase: "📣 Продвижение",  task: "Написать пост в Сообщество YouTube",                       who: "Gemini / ChatGPT" },
      { id: 10, phase: "📣 Продвижение",  task: "Выложить пост в Telegram с ссылкой на YouTube",            who: "ChatGPT" },
      { id: 11, phase: "📣 Продвижение",  task: "Сделать фото / обложку для Telegram",                      who: "ChatGPT" },
    ];

    const WHO_COLORS = {
      "Gemini + Claude":  { bg:"#ede9fe", text:"#6d28d9", border:"#c4b5fd" },
      "Ты":               { bg:"#fce7f3", text:"#be185d", border:"#f9a8d4" },
      "Gemini":           { bg:"#dbeafe", text:"#1d4ed8", border:"#93c5fd" },
      "ChatGPT":          { bg:"#d1fae5", text:"#065f46", border:"#6ee7b7" },
      "Gemini / ChatGPT": { bg:"#fef9c3", text:"#854d0e", border:"#fde047" },
    };

    const phases = [...new Set(STEPS.map(s => s.phase))];
    const defaultVideos = [
      { id: 1, name: "Видео 1", checked: {} },
      { id: 2, name: "Видео 2", checked: {} },
      { id: 3, name: "Видео 3", checked: {} },
    ];

    function App() {
      const [user,      setUser]      = React.useState(null);
      const [loading,   setLoading]   = React.useState(true);
      const [videos,    setVideos]    = React.useState(defaultVideos);
      const [activeId,  setActiveId]  = React.useState(1);
      const [editingId, setEditingId] = React.useState(null);
      const [syncLabel, setSyncLabel] = React.useState("");
      const saveTimer = React.useRef(null);

      React.useEffect(() => auth.onAuthStateChanged(u => { setUser(u); setLoading(false); }), []);

      React.useEffect(() => {
        if (!user) return;
        return db.collection("users").doc(user.uid).onSnapshot(snap => {
          if (snap.exists && snap.data().videos?.length) {
            const v = snap.data().videos;
            setVideos(v);
            setActiveId(v[0].id);
          }
        });
      }, [user]);

      const saveToFirebase = (nv) => {
        if (!user) return;
        clearTimeout(saveTimer.current);
        setSyncLabel("сохраняю...");
        saveTimer.current = setTimeout(() => {
          db.collection("users").doc(user.uid).set({ videos: nv }, { merge: true })
            .then(() => setSyncLabel("✓ сохранено"))
            .catch(() => setSyncLabel("⚠ ошибка"));
        }, 600);
      };

      const updateVideos = (nv) => { setVideos(nv); saveToFirebase(nv); };
      const updateVideo  = (id, patch) => updateVideos(videos.map(v => v.id === id ? { ...v, ...patch } : v));
      const active       = videos.find(v => v.id === activeId);
      const toggle       = (sid) => updateVideo(activeId, { checked: { ...active.checked, [sid]: !active.checked[sid] } });
      const resetVideo   = () => updateVideo(activeId, { checked: {} });
      const addVideo     = () => { const id = Date.now(); updateVideos([...videos, { id, name: `Видео ${videos.length + 1}`, checked: {} }]); setActiveId(id); setEditingId(id); };
      const deleteVideo  = (id) => { const r = videos.filter(v => v.id !== id); updateVideos(r); if (activeId === id) setActiveId(r[0]?.id); };
      const login        = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      const logout       = () => auth.signOut();

      const done  = active ? Object.values(active.checked).filter(Boolean).length : 0;
      const total = STEPS.length;
      const pct   = Math.round((done / total) * 100);

      if (loading) return (
        <div style={{ minHeight:"100vh", background:"#f5f0e8", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <p style={{ color:"#9a8878", fontStyle:"italic", fontSize:18 }}>загружаю...</p>
        </div>
      );

      if (!user) return (
        <div style={{ minHeight:"100vh", background:"#f5f0e8", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:24, padding:32 }}>
          <p style={{ color:"#9a8878", fontSize:13, letterSpacing:3, textTransform:"uppercase" }}>мой канал</p>
          <h1 style={{ color:"#2a2420", fontSize:32, fontWeight:"normal", fontStyle:"italic", textAlign:"center", lineHeight:1.3 }}>
            Чек-лист<br/>выпуска ролика
          </h1>
          <button onClick={login} style={{
            marginTop:8, background:"#8b5e3c", border:"none",
            color:"#fff", padding:"16px 36px", borderRadius:14,
            cursor:"pointer", fontSize:18, fontFamily:"Georgia,serif",
            boxShadow:"0 2px 16px rgba(139,94,60,0.3)",
          }}>
            🔑 Войти через Google
          </button>
        </div>
      );

      return (
        <div style={{ minHeight:"100vh", background:"#f5f0e8" }}>

          {/* Шапка */}
          <div style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"10px 18px", borderBottom:"1px solid #e5ddd0",
            background:"#fffdf8",
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <img src={user.photoURL} alt="" style={{ width:30, height:30, borderRadius:"50%" }} />
              <span style={{ color:"#9a8878", fontSize:15 }}>{user.displayName?.split(" ")[0]}</span>
              <span style={{ color:"#a0b090", fontSize:12 }}>{syncLabel}</span>
            </div>
            <button onClick={logout} style={{
              background:"transparent", border:"1px solid #e5ddd0",
              color:"#9a8878", cursor:"pointer", fontSize:14,
              fontFamily:"inherit", padding:"5px 14px", borderRadius:8,
            }}>выйти</button>
          </div>

          {/* Вкладки */}
          <div style={{
            display:"flex", alignItems:"center", overflowX:"auto",
            borderBottom:"1px solid #e5ddd0", padding:"0 18px", gap:0,
            background:"#fffdf8",
          }}>
            {videos.map(v => {
              const vDone    = Object.values(v.checked).filter(Boolean).length;
              const isActive = v.id === activeId;
              return (
                <div key={v.id} onClick={() => { setActiveId(v.id); setEditingId(null); }}
                  style={{
                    display:"flex", alignItems:"center", gap:8,
                    padding:"14px 18px 12px", cursor:"pointer", flexShrink:0,
                    borderBottom: isActive ? "3px solid #8b5e3c" : "3px solid transparent",
                    transition:"all 0.15s",
                  }}>
                  {editingId === v.id ? (
                    <input autoFocus value={v.name}
                      onClick={e => e.stopPropagation()}
                      onChange={e => updateVideo(v.id, { name: e.target.value })}
                      onBlur={() => setEditingId(null)}
                      onKeyDown={e => e.key === "Enter" && setEditingId(null)}
                      style={{
                        background:"transparent", border:"none",
                        borderBottom:"1px solid #8b5e3c", color:"#2a2420",
                        fontFamily:"inherit", fontSize:16, width:130,
                      }} />
                  ) : (
                    <span onDoubleClick={e => { e.stopPropagation(); setEditingId(v.id); }}
                      style={{
                        fontSize:16, fontWeight: isActive ? "bold" : "normal",
                        color: isActive ? "#8b5e3c" : "#9a8878",
                        maxWidth:150, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                      }}>
                      {v.name}
                    </span>
                  )}
                  <span style={{
                    fontSize:12, flexShrink:0,
                    color: vDone === total ? "#4a7c59" : "#9a8878",
                    background: vDone === total ? "#d1fae5" : "#ede8e0",
                    padding:"2px 8px", borderRadius:20,
                  }}>
                    {vDone === total ? "✓" : `${vDone}/${total}`}
                  </span>
                  {videos.length > 1 && isActive && (
                    <span onClick={e => { e.stopPropagation(); deleteVideo(v.id); }}
                      style={{ color:"#c0b0a0", fontSize:14, cursor:"pointer" }}>✕</span>
                  )}
                </div>
              );
            })}
            <div onClick={addVideo} style={{
              padding:"14px 18px 12px", cursor:"pointer", color:"#9a8878",
              fontSize:24, flexShrink:0, borderBottom:"3px solid transparent",
            }}>+</div>
          </div>

          {/* Контент */}
          {active && (
            <div style={{ maxWidth:620, margin:"0 auto", padding:"28px 18px 60px" }}>

              <div style={{ marginBottom:24 }}>
                <p style={{ color:"#9a8878", fontSize:12, letterSpacing:3, textTransform:"uppercase", marginBottom:8 }}>мой канал</p>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <h1 style={{ fontSize:30, fontWeight:"normal", fontStyle:"italic", color:"#6b4423", cursor:"text" }}
                    onDoubleClick={() => setEditingId(active.id)}>
                    {active.name}
                  </h1>
                  <span onClick={() => setEditingId(active.id)} style={{ color:"#c0a888", fontSize:18, cursor:"pointer" }}>✎</span>
                </div>
                <p style={{ color:"#9a8878", fontSize:15, marginTop:8 }}>{done} из {total} шагов выполнено</p>
              </div>

              {/* Прогресс */}
              <div style={{ height:6, background:"#e5ddd0", borderRadius:3, marginBottom:32, overflow:"hidden" }}>
                <div style={{
                  height:"100%", width:`${pct}%`,
                  background:"linear-gradient(90deg, #c4956a, #e8a87c)",
                  borderRadius:3, transition:"width 0.4s ease",
                }} />
              </div>

              {phases.map(phase => (
                <div key={phase} style={{ marginBottom:28 }}>
                  <p style={{ fontSize:12, letterSpacing:2, textTransform:"uppercase", color:"#9a8878", marginBottom:12, paddingLeft:4 }}>
                    {phase}
                  </p>
                  {STEPS.filter(s => s.phase === phase).map(step => {
                    const isDone = !!active.checked[step.id];
                    const wc = WHO_COLORS[step.who] || { bg:"#f3f4f6", text:"#374151", border:"#d1d5db" };
                    return (
                      <div key={step.id} onClick={() => toggle(step.id)} style={{
                        display:"flex", alignItems:"center", gap:14,
                        padding:"16px 16px", marginBottom:10, borderRadius:14,
                        background: isDone ? "#ede8e0" : "#fffdf8",
                        border:`1px solid ${isDone ? "#d5ccc0" : "#e5ddd0"}`,
                        cursor:"pointer", transition:"all 0.2s",
                        boxShadow: isDone ? "none" : "0 1px 6px rgba(0,0,0,0.04)",
                      }}>
                        <div style={{
                          width:26, height:26, borderRadius:8, flexShrink:0,
                          border:`2px solid ${isDone ? "#8b5e3c" : "#c4a882"}`,
                          background: isDone ? "#8b5e3c" : "transparent",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          transition:"all 0.2s",
                        }}>
                          {isDone && (
                            <svg width="13" height="11" viewBox="0 0 13 11" fill="none">
                              <path d="M1 5.5L5 9.5L12 1" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                          )}
                        </div>
                        <p style={{
                          flex:1, margin:0, fontSize:16, lineHeight:1.5,
                          color: isDone ? "#b8a898" : "#2a2420",
                          textDecoration: isDone ? "line-through" : "none",
                        }}>{step.task}</p>
                        <span style={{
                          fontSize:13, padding:"4px 11px", borderRadius:20,
                          background: wc.bg, color: wc.text,
                          border:`1px solid ${wc.border}`,
                          whiteSpace:"nowrap", flexShrink:0, fontFamily:"sans-serif",
                        }}>{step.who}</span>
                      </div>
                    );
                  })}
                </div>
              ))}

              {done === total && (
                <div style={{
                  textAlign:"center", padding:32, background:"#fffbf0",
                  borderRadius:18, border:"1px solid #f0d080", marginTop:8,
                }}>
                  <p style={{ fontSize:36, marginBottom:10 }}>🎉</p>
                  <p style={{ color:"#8b6914", fontStyle:"italic", fontSize:20 }}>Ролик выпущен! Умница.</p>
                </div>
              )}

              <button onClick={resetVideo} style={{
                marginTop:28, background:"transparent",
                border:"1px solid #e5ddd0", color:"#9a8878",
                padding:"12px 20px", borderRadius:12,
                cursor:"pointer", fontSize:15, display:"block",
                width:"100%", fontFamily:"inherit",
              }}>сбросить чек-лист этого видео</button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
